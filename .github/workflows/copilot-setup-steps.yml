name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run check
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
